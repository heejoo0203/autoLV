<!doctype html>
<html lang="ko">

    <title>필지랩</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;

        font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
      }
      .wrap {
        text-align: center;
        padding: 24px;
      }

        font-weight: 900;
        letter-spacing: -0.02em;
      }
      .brand span {
        color: #5f87d6;
      }
      .hint {
        margin-top: 8px;
        color: #334155;
      }

  <body>
    <div class="wrap">
      <div class="brand">필지랩</div>
