<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>필지랩</title>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      text-align: center;
      max-width: 1100px;
      margin: 40px auto;
    }
    .section {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin: 16px 0;
      flex-wrap: wrap;
    }
    select, input, button {
      padding: 0 8px;
    }
    button {
      cursor: pointer;
    }
    #sido, #sigungu, #dong, #is_san, #main_no, #sub_no {
      height: 39px;
      font-size: 20px;
      border-radius: 8px;
    }
    #sido { width: 200px; }
    #sigungu, #dong { width: 220px; }
    #is_san { width: 200px; }
    #main_no, #sub_no { width: 175px; }
    #add-btn, #query-btn {
      width: 330px;
      height: 50px;
      font-size: 25px;
      font-weight: bold;
      border-radius: 8px;
    }
    #hyphen {
      font-size: 20px;
      padding: 0 8px;
    }
    button.delete {
      background-color: white;
      border: none;
      color: red;
      font-weight: bold;
      font-size: 18px;
      cursor: pointer;
    }
    table {
      margin: 20px auto;
      border-collapse: collapse;
      width: 100%;
    }
    th, td {
      border: 1px solid #888;
      padding: 8px 12px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1><strong>필지랩</strong></h1>

  <div class="section">
    <select id="sido" onchange="loadSigungu()"><option value="">시/도 선택</option></select>
    <select id="sigungu" onchange="loadDong()"><option value="">시/군/구 선택</option></select>
    <select id="dong"><option value="">읍/면/동 선택</option></select>
  </div>

  <div class="section">
    <select id="is_san">
      <option value="false">일반</option>
      <option value="true">산</option>
    </select>
    <input type="text" id="main_no" placeholder="본번 입력" />
    <span id="hyphen">-</span>
    <input type="text" id="sub_no" placeholder="부번 입력" />
  </div>

  <div class="section">
    <button id="add-btn" onclick="addRow()">추가</button>
    <button id="query-btn" onclick="query()">조회</button>
  </div>

  <table id="result-table">
    <thead>
      <tr>
        <th>순번</th>
        <th>주소</th>
        <th>동</th>
        <th>호수</th>
        <th>지목</th>
        <th>토지면적 (m²)</th>
        <th>공부상면적 (m²)</th>
        <th>개별공시지가 (원/m²)</th>
        <th>공시일자</th>
        <th>삭제</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <div class="section">
    <button onclick="downloadCSV()">결과 다운로드</button>
  </div>

  <script>
    let count = 1;
    let ldMap = {};

    window.onload = async () => {
      const res = await fetch("ld_codes.json");
      ldMap = await res.json();
      const sidoSel = document.getElementById("sido");
      Object.keys(ldMap).forEach(sido => {
        sidoSel.innerHTML += `<option value="${sido}">${sido}</option>`;
      });
    };

    function loadSigungu() {
      const sido = document.getElementById("sido").value;
      const sigunguSel = document.getElementById("sigungu");
      sigunguSel.innerHTML = `<option value="">시/군/구 선택</option>`;
      document.getElementById("dong").innerHTML = `<option value="">읍/면/동 선택</option>`;
      if (!sido) return;
      Object.keys(ldMap[sido]).forEach(sg => {
        sigunguSel.innerHTML += `<option value="${sg}">${sg}</option>`;
      });
    }

    function loadDong() {
      const sido = document.getElementById("sido").value;
      const sigungu = document.getElementById("sigungu").value;
      const dongSel = document.getElementById("dong");
      dongSel.innerHTML = `<option value="">읍/면/동 선택</option>`;
      if (!sido || !sigungu) return;
      Object.keys(ldMap[sido][sigungu]).forEach(dong => {
        dongSel.innerHTML += `<option value="${dong}">${dong}</option>`;
      });
    }

    function addRow() {
      const sido = document.getElementById("sido").value;
      const sigungu = document.getElementById("sigungu").value;
      const dong = document.getElementById("dong").value;
      const ld_code = ldMap[sido]?.[sigungu]?.[dong];
      const main = document.getElementById("main_no").value;
      const sub = document.getElementById("sub_no").value || 0;
      const san = document.getElementById("is_san").value;

      if (!ld_code || !main) {
        alert("주소와 본번을 입력하세요");
        return;
      }

      const jibun = `${san === "true" ? '산 ' : ''}${main}${sub ? '-' + sub : ''}`;
      const tbody = document.querySelector("#result-table tbody");

      const row = document.createElement("tr");
      row.setAttribute("data-new", "true");
      row.innerHTML = `
        <td></td>
        <td data-ld="${ld_code}" data-main="${main}" data-sub="${sub}" data-san="${san}">
          ${sido} ${sigungu} ${dong} ${jibun}
        </td>
        <td>-</td> <!-- 동 -->
        <td>-</td> <!-- 호 -->
        <td>-</td> <!-- 지목 -->
        <td>-</td> <!-- 토지면적 -->
        <td>-</td> <!-- 공부상면적 -->
        <td>-</td> <!-- 공시지가 -->
        <td>-</td> <!-- 공시일자 -->
        <td><button class="delete" onclick="deleteRow(this)">✕</button></td>
      `;
      tbody.appendChild(row);
      updateRowNumbers();
    }

    function deleteRow(button) {
      button.closest('tr').remove();
      updateRowNumbers();
    }

    function updateRowNumbers() {
      document.querySelectorAll("#result-table tbody tr").forEach((row, idx) => {
        row.cells[0].innerText = idx + 1;
      });
    }

    async function query() {
  const rows = document.querySelectorAll("#result-table tbody tr");
  for (const row of rows) {
    if (row.dataset.fetched === "true") continue;  // ✅ 이미 조회한 행은 건너뛰기

    const td = row.cells[1];
    const ld = td.dataset.ld;
    const main = td.dataset.main;
    const sub = td.dataset.sub || 0;
    const san = td.dataset.san;

    try {
      const res = await fetch(`http://127.0.0.1:8000/landprice/api?ld_code=${ld}&main_no=${main}&sub_no=${sub}&is_san=${san}`);
      const data = await res.json();

      const tbody = document.querySelector("#result-table tbody");

      if (data.units && data.units.length > 0) {
        data.units.forEach((unit, index) => {
          const rowElement = document.createElement("tr");
          rowElement.dataset.fetched = "true";  // ✅ 조회된 행 표시

          rowElement.innerHTML = `
            <td></td>
            <td>${data.address}</td>
            <td>${unit.dong}</td>
            <td>${unit.ho}</td>
            <td>${data.jimok}</td>
            <td>${unit.area}</td>
            <td>${index === 0 ? data.total_area : "-"}</td>
            <td>${Number(data.price_per_m2).toLocaleString()}</td>
            <td>${data.date}</td>
            <td><button class="delete" onclick="deleteRow(this)">✕</button></td>
          `;
          tbody.appendChild(rowElement);
        });
      } else {
        // 기본 정보만 표시할 경우
        row.cells[2].innerText = "-";
        row.cells[3].innerText = "-";
        row.cells[4].innerText = data.jimok || "-";
        row.cells[5].innerText = data.area || "-";
        row.cells[6].innerText = data.total_area || "-";
        row.cells[7].innerText = Number(data.price_per_m2).toLocaleString();
        row.cells[8].innerText = data.date || "-";
        row.dataset.fetched = "true";  // ✅ 조회된 행 표시
      }
    } catch (e) {
      console.error("API 요청 실패:", e);
    }
  }

  updateRowNumbers();
}


    function downloadCSV() {
      const rows = document.querySelectorAll("#result-table tr");
      const csv = [];
      rows.forEach((row) => {
        const cells = Array.from(row.querySelectorAll("th, td"));
        cells.pop(); // 삭제 열 제거
        const rowData = cells.map(td => `"${td.innerText}"`);
        csv.push(rowData.join(","));
      });
      const BOM = "\uFEFF";
      const blob = new Blob([BOM + csv.join("\n")], { type: "text/csv;charset=utf-8;" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "개별공시지가.csv";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }
  </script>
</body>
</html>
